body:
  text: 卷四備選方蜀漆散蜀漆雲母龍骨牡蠣湯黃耆麻黃根牡蠣柴胡去半夏加栝蔞根湯柴胡黃芩人參栝蔞根甘草生薑大棗柴胡桂薑湯柴胡桂枝乾薑栝蔞根黃芩牡蠣甘草竹葉石膏湯竹葉石膏半夏麥門冬人參甘草粳米黃耆五物湯黃耆芍藥桂枝生薑大棗蜀漆丸蜀漆知母升麻白薇地骨皮麥門冬烏梅肉鱉甲萎蕤石膏甘草常山豆豉清脾飲青皮厚朴白朮草果仁柴胡茯苓黃芩半夏甘草常山飲常山烏頭甘草蒜糯米豆豉甑帶四獸飲半夏茯苓人參草果陳皮甘草烏梅肉白朮生薑大棗截瘧七寶丹厚朴陳皮甘草草果仁常山檳榔青皮鱉甲飲鱉甲黃耆人參當歸白朮白茯苓川芎白芍甘草陳皮青皮半夏三稜莪朮檳榔厚朴柴胡補中益氣湯黃耆甘草人參當歸橘皮升麻柴胡白朮露姜飲別直參生薑烏梅飲烏梅細辛乾薑黃連當歸附子蜀椒桂枝人參黃柏大清涼散白殭蠶蟬蛻全蠍當歸生地金銀花澤蘭木通車前子黃連黃芩梔仁五味子麥門冬龍膽草丹皮甘草清化湯白殭蠶蟬蛻金銀花澤蘭廣皮黃芩黃連梔子連翹
