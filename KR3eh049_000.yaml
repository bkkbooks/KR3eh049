front:
  text: 序人之一身首重榮衛外而皮肉筋骨內而經絡藏府無非榮衛為之煦濡調和則安逆亂則病離絕則死是榮衛為人身之化機凡百疾病皆系焉而瘧其尤著者也考素問瘧論及刺瘧篇分六經分五藏分六府雖發時不同病形各異而要其旨歸則總關於榮衛之見端曰夏傷於暑藏於皮膚之內腸胃之外此榮氣之所舍也非瘧舍之關榮者乎曰衛氣之所在與邪氣相合則病作非瘧發之關衛者乎仲景淵源相承曰瘧脈自弦以瘧邪伏於榮舍發則阻滯衛氣故也靈樞論衛氣失常則脈大弦急金匱論腹痛寒疝弦則衛氣不行籲仲景一語抵人千百此其所以為百世之師乎後世諸家不加研究迄今千餘載瘧病絕少定論西昌喻氏洄溪徐氏皆謂風暑入少陽率以柴胡為不祧之法拘矣葉天士治瘧一生不用柴胡王士雄謂柴胡只可治少陽正瘧雖不如喻徐兩公子之專主少陽而於榮衛曾莫之及費伯雄以少陽不能主瘧而有在衛在榮在府之分韓善徵謂瘧不專屬少陽而有衛氣榮血之論是於榮衛近之矣而未中瘧關榮衛之的惟盧之頤痎瘧論疏全引經文以白虎各半治榮舍青龍各半治衛氣雖於瘧舍關榮瘧發關衛啟其端倪而不能大暢厥詞讀其書者有遺憾焉餘業醫近十年竊嘆瘧之劇繁且險反復流連非特一兩月不痊甚有延至二三年者診驗之餘幾經博考冥索始知瘧以榮衛為主腦治之輒獲效果而析疑辨難互相切劘則吾鄉陳原欽先生之力為最多乃不採譾陋彙集成篇先將榮衛之生始會合內外出入陰陽順逆道路異同度數疾徐一一剖晰挈明大旨然後分論瘧舍之關榮瘧發之關衛而溫熱暑濕各因藏府經絡諸症與夫病情之傳變病勢之兼併並著於篇以備治瘧者之採擇焉雖然榮衛為人身之化機凡百疾病皆系焉能明夫榮衛之生始會合內外出入陰陽順逆道路異同度數疾徐又豈僅可以治瘧已哉中華民國元年二月自序於養生園序天地之大日月運行焉人身之大榮衛運行焉天地有羅孛與日月同道則日月蝕人身有伏邪與榮衛並居則榮衛偏此瘧病之關榮衛也余初業醫臨症治瘧輒主少陽所用成方多不效竊以為瘧酷瘧也如此大症斷非拘一經執一藥所能治者奈後世治瘧諸家紛紛聚訟西昌喻氏專主少陽以柴胡為主沈再平於主用柴胡治瘧者非之葉氏醫案治瘧不用柴胡徐洄溪非之迄莫折衷一是進求金匱瘧病寥寥數節難尋端緒即瘧脈自弦之文注家多牽入少陽矣乃取素問瘧論刺瘧篇讀之瘧論言巨陽陽明不及少陽刺瘧篇首列六經不專重少陽仍莫得其指歸於是反復尋繹瘧論有曰此榮氣之所舍也又曰與衛氣並居不覺頓悟曰瘧病關榮衛不特不專主少陽並不專主六經矣獨是榮衛運行為百病轄考內經以榮衛名篇首者凡六其散見者不止瘧論數節互相發明余於榮衛之生會主散出入順逆道路之各殊疾徐之異度幾經默悟冥搜殊難了了急索解人不得以為醫不明榮衛無論百病即治瘧莫試也劉君裁吾性穎悟青年篤於醫與余交最厚居址距數里故往來尤密凡醫書與病症之疑難相與質辨近十年至論瘧病關於榮衛尤心相印一日袖卷授余曰此所著治瘧機要也余展誦之其書先將榮衛挈明大旨次論瘧舍關榮瘧發關衛瘧脈自弦皆獨出心裁闡明經旨後論溫熱暑濕各因經絡藏府諸症與夫病變病並無不奏刀騞然所選諸方一經指點用以治瘧皆能中榮衛之的瘧病得此誠暗室一燈千載之疑竇破矣雖然是書條分榮衛意在令閱者醒目似有無數榮衛其實一也能明夫榮衛之主散生會其中出入順逆道路度數一如日月之運行天地或一日一周或一月一周或一年一周雖光芒之照射各殊不得謂非一日月敢以質之劉君並天下之留心榮衛者是為序中華民國元年五月同邑原欽陳寶序於松蔭山房序處世界競爭之大舞臺無論何業苟無學問閱歷則在天演淘汰之內必不能占最優勝之地醫學一門亦然余曾循長江涉重洋東北至津奉經過閩浙江寧蘇滬素稱醫術向產名賢之區意必有邃學問深閱歷其人者互相討論倡明此道而卒罕遇其人至是而益嘆劉君裁吾之不可多得也其人向勤學善穎悟與余攻方書有年而進步之速不可以道里計近十年來學更有進讀書別有會心編入醫學檀幾約百餘卷其曰傷寒匯方曰金匱鑑別曰外臺發揮曰金元四家節要曰景岳選瑜曰喻氏節要曰葉案選粹曰王案類編曰溫熱精言曰喉科扼要其餘有疑則辨之有得則筆之有訛則證之雜卷浩繁不可枚舉所臨之症編入編症自鏡積日累月每年不下數十卷其例先姓名次年齡次病症次脈象次舌苔次形色次服藥一一標準然後著案著方審慎周詳議論卓越靡不娓娓動人雖喻嘉言之議病式近世之診斷學有過之無不及其學問之邃閱歷之深為何如萍跡漂泊企仰殊深吾知劉君當更有進也及歸造訪又編成治瘧機要四卷矣回憶向之遊閩浙江寧蘇滬時夏秋之病瘧者纏綿歲月劇繁且惡中醫只知柴胡法之一治固不愈西醫之規尼丁殺其蟲毒鐵劑補其血液終嫌其隘而未盡效得是書讀之研究病源直探其根柢選擇方法亦極其閎通榮衛三焦洞若觀火暑濕諸症朗若列眉豈徒治瘧之機要已哉余不辭校閱勸付梨棗亦保種之一端也方今中外交通科學互參劉君以翹楚青年既精中醫而並博及西醫朝夕研核不遺餘力其學問之邃閱歷之深又當何如耶中華民國元年八月同邑洪嶷謝邑南序於養性學校
