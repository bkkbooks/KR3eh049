body:
  text: 卷三列方青龍白虎各半湯麻黃芍藥細辛乾薑甘草桂枝半夏五味子石膏知母甘草粳米三消飲檳榔草果厚朴白芍甘草知母黃芩大黃葛根羌活柴胡甘露消毒丹飛滑石綿茵陳淡黃芩石菖蒲川貝母木通藿香射干連翹薄荷白豆蔻清燥救肺湯冬桑葉石膏人參甘草胡麻仁阿膠麥門冬杏仁枇杷葉導赤瀉心各半湯生地黃木通生甘草梢大黃黃連黃芩神犀丹烏犀角尖石菖蒲黃芩懷生地銀花金汁連翹板藍根香豉元參花粉紫草牛黃清心丸牛黃硃砂黃連黃芩山梔鬱金小陷胸湯黃連半夏栝蔞實溫膽湯半夏竹茹陳皮甘草茯苓達原飲檳榔厚朴草果知母芍藥黃芩甘草蒼朮白虎湯知母甘草石膏蒼朮粳米堇竹螵蛸湯堇竹葉海螵蛸常山石膏不換金正氣散厚朴藿香甘草半夏蒼朮陳皮瀉黃散藿香山梔仁石膏甘草防風碧玉散滑石甘草青黛當歸龍薈丸當歸龍膽草梔子黃連黃芩蘆薈大黃木香麝香龍膽瀉肝湯龍膽草黃芩梔子澤瀉車前子當歸生地黃柴胡生甘草犀角地黃湯犀角生地黃芍藥牡丹皮二妙地黃丸熟地山茱萸牡丹皮白茯苓懷山藥澤瀉川黃柏熟附子蒼朮鱉甲煎丸鱉甲黃耆人參當歸白朮白茯苓川芎白芍甘草陳皮三稜莪朮厚朴柴胡檳榔黃芩湯黃芩當歸黃連檳榔木香甘草大黃官桂桂枝白虎湯知母甘草石膏粳米桂枝葛根黃芩黃連湯葛根黃芩黃連甘草清溫敗毒飲生石膏梔子桔梗黃芩知母赤芍玄參連翹甘草丹皮鮮竹葉葦莖湯葦莖薏苡仁冬瓜子桃仁四逆散甘草枳實柴胡芍藥白頭翁湯白頭翁黃柏黃連秦皮甘桔湯甘草桔梗通竅活血湯赤芍川芎桃仁丹皮烏藥延胡索甘草香附紅花枳殼補陽還五湯黃耆當歸赤芍地龍川芎紅花桃仁醋黃散大黃鬱金子降香三七當歸牛膝人參芎歸湯人參當歸半夏川芎蓬朮木香大黃甘遂湯大黃甘遂阿膠
