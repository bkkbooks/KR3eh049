body:
  text: 卷二論暑濕瘧喻嘉言因內經運氣主病少陰君火與太陰濕土一類同推不分彼此遂謂夏傷於暑秋為痎瘧其中定有脫漏補出長夏傷於濕一語於六氣配四時之旨燦然大備蓋天之暑氣下降地之濕氣上騰人在氣交之中口鼻交受其氣自鼻入者從鼻管吸入過肺歷心系伏於上焦之膜原復自心系循背脊下腎系達網膜至臍下丹田氣海之中伏於下焦之膜原自口入者從胃脘散於兩脅板油伏於中焦之膜原夫暑濕之伏非能自伏也蓋炎暑退而機衡轉隨人身收藏之氣漸伏而漸深故初秋發瘧尚在肺胃之分至於冬令嚴寒則無不發於三陰之地矣暑性暄發令人汗空疏腠理開瘧之初起往往有因秋月之風涼閉住腠理而瘧乃作者素問瘧論言之不一有謂因秋月汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居者有謂因遇夏月淒滄之水寒藏於腠理皮膚之中秋傷於風而病成者有謂因有所用力腠理開風寒舍於皮膚之內分肉之間而發者是暑熱之氣先伏於內而風寒之邪復從外束治當先解其外束之寒次清其內蘊之熱或兩法合投表裡並施尤為簡括考瘧門方中惟王肯堂症治準繩內立二方一用升麻柴胡葛根羌活防風甘草一用石膏知母粳米紅花桃仁豬苓鯪鯉甲深得此旨盧子頤解其方曰風暑合作應從兩治但有奇偶輕重之別其始也形症必稍偏於風此固未易釀熱先須重於從風輕於從暑不必盡用全方解表利小水足矣久則暑熱熾盛二氣平均現症稍無偏勝必從全方合治故復為一方名曰青龍白虎各半湯蓋暑藏榮舍須當治暑白虎全方正治暑之劑藏之榮舍亦須治榮桃仁紅花之類鯪鯉穴山而居遇水而入則是入陰出陽穿其經絡於榮舍舍且顛倒暑更從何棲止風並衛氣亦須治風五種風藥正治風之劑況衛氣下陷陰中並致三陽亦陷提挈三陽則衛氣自持如羌活之挈太陽葛根之挈陽明柴胡之挈少陽是也若有兼沐浴之水氣舍於皮膚者即以豬苓徹之兼淒滄之水寒侵著肌腠者豬苓固能利徹更須佐以辛溫乃可對待水寒羌活柴胡之類是也盧氏論瘧惟此段精切可法但知母石膏為肺胃之藥桃仁紅花乃輕散之品用治上焦瘧固當若中下兩瘧則嫌有未合者余嘗治中焦瘧而外挾風涼者以吳氏三消飲為主羌活葛根柴胡可解外寒知母黃芩大黃可除伏熱芍藥開泄陰結便有傾倒榮舍之功至於草果檳榔厚朴直入中焦開達膜原蠲除伏氣稱為聖劑宋元以來無方不用如局方之常山飲易簡之七寶丹岩氏之鱉甲飲是也吳氏胎化以治疫今仍取以治瘧法尤切若下焦之瘧而外挾風涼者又當用玄參生地黃芍藥丹皮以清肝腎之熱鱉甲牡蠣鯪鯉甲攻倒榮舍梔子滑石木通開達網膜即能引熱下出仍取羌活葛根柴胡以祛外感之風涼是從王肯堂吳又可引而伸之擴而充之者也若外感風涼已去惟暑濕伏邪舍於內外之膜原者在上焦則為心肺之瘧在中焦則為胃脾膽之瘧在下焦則為肝腎之瘧在奇經則為督沖之瘧各有專症各有主方詳細辨論分別於下瘧邪舍於肺膜咳嗽頻仍寒從背起入秋即發此瘧病之最淺者若舌苔淡白或厚膩干黃胸脘滿悶者濕熱尚在氣分宜甘露消毒丹主之以白蔻藿香石菖蒲之芳香宣通肺膜若舌無苔而鮮絳或隱隱浮黑清晨瘧發此暑熱伏於榮分宜仿喻氏清燥救肺法取犀角生地黃之清涼去阿膠麻仁之滋潤加桃仁鯪鯉甲以傾倒榮舍也經云癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄此即暑伏肺膜之瘧下文繼之曰氣內藏於心外舍於分肉之間者以心主榮而瘧邪藏於榮舍之中也瘧邪舍於心膜煩熱昏狂譫語發斑此皆包絡之見症以心不受邪受邪則死故凡心病皆屬包絡之病暑熱始受在肺逆傳內陷則閉心包之竅每有厥脫之虞故治此瘧必以開達心膜為首務其受之輕者以導赤瀉心各半湯引從小便而出可也若舌色干光或紫絳或圓硬或黑苔起刺必用神犀丹之類以犀角紫草能入榮攻舍豆豉菖蒲能宣竅開膜也若神識昏迷舌白渴不欲飲小水不通系濕熱蒙閉膻中致氣化不行於州都宜用薏苡仁茯苓大腹皮豬苓通草竹葉煎湯送下牛黃丸芳香通神淡滲宣竅俾濕濁穢氣從此分消若舌苔黃膩胸痞者如胖酷喜熱湯脈弦滑右甚則為痰飲盤踞心主之宮城宜小陷胸合溫膽湯加薤白開通痰涎暑象畢現再按法以清其暑可也夫肺邪陷心猶為易治若肝腎伏邪自下而上衝於心根本之地先已受傷雖投劑得宜神識頗清亦延久而告斃此前人所未道及也瘧邪舍於胃膜日晡潮熱胃脘飽悶舌苔白厚口中黏膩濕熱阻遏膜原者宜達原飲主之使邪氣潰散速離膜原或用蒼朮白虎湯以蒼朮之臊臭燥烈與草果之攻用相近也若但熱不寒渴飲汗出少氣煩冤手足熱而欲嘔如金匱所謂癉瘧者系暑伏陽明榮分故曰其氣內藏於心而外舍於分肉之間宜白虎湯去粳米合晉三犀角地黃湯加丹參芍藥主之或堇竹螵蛸湯以石膏竹葉之清暑螵蛸能驅逐榮舍之固結常山能宣開膜原之壅滯亦頗切當今人用竹葉石膏湯意非不是但少入榮攻舍之法終嫌未妥繆仲淳善治暑瘧每用當歸牛膝鱉甲首烏等藥於陽明症中無非為榮舍計也瘧邪舍於脾膜口甜黏膩苔白脘悶寒起四末渴喜熱飲大腹脹悶宜用不換金正氣散加黃連黃芩芍藥主之以辛溫開膜化濕苦寒清熱降火也若唇口乾燥煩渴手足心熱脈右關數此係暑伏脾經宜瀉黃散主之此方妙在防風一味鼓動太陰之膜俾脾熱從梔子引而下出耳宋元相傳之四獸飲清脾飲意非不在太陰但執瘧不離乎肝膽之說四獸飲用烏梅以入肝清脾飲用柴胡以入膽終未達瘧疾之旨耳瘧邪舍於膽膜脈弦左數暮熱早涼渴飲汗出宜仿葉天上法以桑葉丹皮直入少陽為君知母栝蔞根清暑為臣佐鱉甲搜滌內舍使青蒿引邪外出與小柴胡湯之治少陽瘧者大有寒熱之別也若嘔吐清水或痰多濁稠是濕熱內留木火上逆蒙閉清陽氣逼上竅故耳鳴耳聾宜溫膽湯去甘草加栝蔞實藕荷杆合碧玉散主之取栝蔞荷杆宣通膈膜俾濕痰退而瘧自止如頭偏痛連齒夜寐不安間日瘧發神迷錯語系膽火升越震動心主宜仿林羲桐法以鉤藤鱉甲牡丹皮梔子麥門冬黃芩連翹半夏夜交藤煎服送下牛黃丸清膽火而寧心神其瘧自已瘧邪舍於肝膜消渴氣上衝心心中疼熱乾嘔吐蛔此皆厥陰之見症若瘧發周夜累月不解口苦味酸胸悶欲絕小溲赤黑或深紅綠碧宜用當歸蘆薈丸主之以木麝之香竄走絡可以宣開膜原協當歸之辛潤和血可以攻倒榮舍也如小溲短澀渾赤有腳熱疼難忍者此係濕蘊肝經以致疏泄失職宜龍膽瀉肝湯以導之若瘧發之時痙厥搐搦宜犀角地黃湯加羚羊角玄參菊花絲瓜絡竹茹木通荷葉露以育陰息風舒筋透膜也瘧起鼻冷額汗顴紅目赤或面目青慘則肝陰先耗風陽上越宜用鱉甲龜甲牡蠣天門冬麥門冬生地黃肉蓯蓉阿膠金鈴子之類育陰以清熱潛陽以攻舍蓋此乃瘧邪干犯厥陰之神藏投劑稍乖則狂風不息根荄立拔不數發而即斃矣瘧邪舍於腎膜子夜瘧發口乾嗜飲兩腰收痛如刀錐刺脈弦而細尺中數甚此皆少陰之見症宜仿王孟英法用玄參生地黃知母牡丹皮地骨皮天門冬龜板茯苓石斛桑葉一派甘寒之品少佐鹹寒入腎補水清熱濕甚者宜二妙地黃丸加龜板鱉甲玄參主之育陰之中兼以驅濕也夫濕熱伏腎則必腎陰先耗以致外邪乘虛而入治之之法滲濕傷陰滋陰助濕兩相妨礙實有難於驅除者葉天士謂陽虛之體濕熱一去陽亦衰微尚可扶陽祛濕而陰虛之體濕熱一去陰即涸竭便成壞症不可救藥此昔人所以有干及腎陰則為瘧勞之說也治病者當預防陰津於未傷之先毋徒以祛濕為能事瘧邪舍於督沖任則為奇經之瘧經謂邪氣客於風府循膂而下衛氣一日一夜大會於風府明日日下一節瘧邪亦日下一節以此日作益晏者蓋自頂後髮際至膂骨計七節則瘧之作於此七節者日晏七分矣自腰間膂骨至尾骶計十四節則瘧之作於此十四節者日晏十四分矣衛氣之循督脈而行於背者以朔日出於風府數之至二十一日則下至骶骨盡之矣夫督脈起於腎下至胞中而衝脈起於胞中會於臍至胸中而上挾咽胞中乃督沖交接之所二十一日以前衛氣行於背邪氣循督脈而下則為督脈之瘧二十二日以後衛氣行於腹邪氣循衝脈而上則為衝脈之瘧故衛氣入於脊注於伏沖之內其氣上行九日出於缺盆作日自此益早也仲景淵源相承所以申之日病瘧以月一日發當十五愈設不差當月盡解蓋自朔至望月由始生而滿月滿則衛氣旺瘧邪無地自容矣自望至晦月由滿極而空月空則衛氣去形身而居於伏沖之內過日則月之初蘇又至矣瘧邪雖盛亦強弓之末耳豈能復熾哉設仍不差瘧邪必由督入任緣任脈起胞中盤踞其間結為癥瘕命曰瘧母此即任脈之瘧經云任脈為病男子內結七疝女子帶下癥瘕是疝㿗癥瘕之類必結於任也後世謂肝藏血瘧母必屬於肝此於癥瘕二字似乎可解其何以解當十五日愈一月盡解之文耶但瘧邪舍此三經根深蒂固非可遽滅軒岐用針灸不立方仲景主之以鱉甲煎丸者以三經同出一源可以治任即可以治沖與督也方義詳三卷列方內論溫熱瘧溫熱瘧者得之冬中風寒伏藏於骨髓之中有隨人身生陽之氣而發泄者有隨時令之氣而發泄者夫人身生陽之氣根於腎藏始發於肝木木生火火生土土生金金生水生生不息邪動則病發隨氣所注而無定處故靈樞經論熱病首列肝次列心脾肺腎難經謂溫熱之脈行在諸經不知何經之動各隨其經之所在而取之仲景謂伏氣之病以意候之如脈微弱喉中痛似傷則為少陰溫病發熱而渴不惡寒則為太陽溫病之類散見於傷寒論中是知溫熱發於何經即現何經之脈象則當按經以治之也然溫暑同為熱邪治法似乎區別惟溫熱自下而上暑濕自上而下稍有不同耳其隨時令之氣而發泄者經云凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑蓋夏至以前從少陽而上出者則為溫病以少陽為初生之陽也夏至以後從陽明而直出者則為熱病以陽明為陽熱之極也從少陽而上出者脈左弦數口苦咽乾脅痛下利而嘔宜用黃芩湯加黃連竹茹鱉甲丹皮主之從陽明而直出者脈右洪數壯熱渴飲骨節煩疼宜桂枝白虎湯主之如兩手三部脈俱數腹痛下利是溫熱從兩經而並出也宜葛根黃連黃芩湯加芍藥甘草主之以芍藥為肝膽泄熱之品能攻榮舍葛根為陽明引經之藥能開腠膜如熱極發斑狂躁妄語宜清溫敗毒飲主之此為氣血兩清之大劑妙在丹皮芍藥有入榮開結之功也至於內蘊濕邪當兼去濕外感風寒當先解表活法在人隨症施用何俟瑣瀆論外感轉瘧靈樞經云魄汗未盡形弱氣爍穴俞以閉發為風瘧葉天士云濕溫邪留三焦則分消上下之勢可望轉瘧之機括王孟英云感受風溫濕溫暑熱之邪者輕則為時感重則為時瘧而溫熱暑濕諸感症之邪氣留連者治之得法亦可使之轉瘧而出觀此則知風寒溫熱暑濕諸瘧有起自外感者必轉屬而後成鮮有初起即為瘧者蓋發熱惡寒終日不休固系並行五十周之榮衛即或一日二三度發寒熱如瘧亦系並行五十周之榮衛若轉而為瘧則並行五十周之榮衛交通於二十八脈之中流行無阻環循不息而邪氣陷入於內外膜原之間伏而不動迨至發動之時與日行陽夜行陰之衛氣相遇則瘧作矣不然邪氣與並行五十周之榮衛晝夜鏖戰尚無片刻之息安有休止之日哉是故強壯之人易於轉瘧則並行五十周之榮衛強旺而邪氣被遏既不能傳變於內又不能宣發於外頃刻煽動一身不能自主者以日行陽夜行陰之衛氣與邪氣相搏也若年老質弱氣澀血涸者一病當前而並行五十周之榮衛不能流暢於二十八脈嘗致衰絕而泣除縱或寒熱如瘧而終不能成瘧每一病而不可救藥然則諺所謂傷寒轉瘧即為不死之症者非以榮衛之盛衰覘病之生死哉至於治法伏邪既明外感自知惟風寒從皮毛而入與溫熱暑濕之從口鼻而入者不同治法自當別論雜見諸書繁不及錄論瘧痢瘧痢一症言之難矣內經不論金匱不詳近世之治此者皆以高鼓峰趙養葵張石頑為宗旨謂陽氣下陷則用補中益氣之屬謂脾腎虛脫則用桂附八味之屬不知病由暑濕蘊積惟溫補是圖死亡接踵傷心慘目喻嘉言雖知為伏邪而其按經用藥不離少陽一經亦拘矣徐靈胎謂寒熱未止必有外邪血痢未清必有內邪以一病分為兩歧殊少把握蓋暑濕伏於榮舍動於膜原於與衛氣相阻則為瘧若潰於腸胃肝肺不調則為痢矣如脈右洪數口渴身熱咳嗽胸痞痢下白濁病偏於肺者以秋乃肺金主氣肺不通調則水濁氣滯下奔大腸發為白痢迫注者肺之肅不通者金之收也宜葦莖湯加甘草桔梗黃芩芍藥主之清滲濕熱以攻榮舍疏通氣滯以開肺膜也如脈左弦數腹痛夜熱舌絳消渴痢下紅積病偏於肝者以肺金當秋剋制肝木肝失條達風火內動逼血妄行發為紅痢暴注者肝之疏不通者木之郁也宜白頭翁湯加芍藥鱉甲清潛相火即能攻倒榮舍合四逆散疏泄肝木即能宣達肝膜也至於肝肺互相為病求其止奔迫解鬱結一方而並治者自古無之惟唐容川獨得其秘謂肺氣傳送太力故暴注大腸肝氣鬱而不疏故肛門閉塞擬用白頭翁湯加石膏知母杏仁桔梗枳殼檳榔柴胡麥芽當歸芍藥甘草治之輕則用小柴胡湯加當歸芍藥杏仁桔梗枳殼檳榔麥芽栝蔞根調和肝肺則肺氣不迫注肝氣得開利矣吾於此悟當歸芍藥之能入榮舍柴胡檳榔之能開腠膜於瘧病亦適合焉又謂肝氣決列而下注肺氣閉塞而不開故暴注迫痛此解直髮前人所未發然用甘梗湯加芍藥與開通肺氣之義尚合於肝氣決列猶未當也余嘗以白頭翁湯加三甲以清潛相火為主欲開提肺氣合甘桔湯欲清肅肺金合葦莖湯隨症施用左右逢原若瘧之後變痢痢之後轉瘧瘧痢之原頭既剖晰而詳言之矣是在人之善用方者論瘧臌瘧者邪氣伏於榮舍與衛氣相遇而後發者也何以成臌哉以邪氣伏於榮舍與衛氣相遇而後發發之不已則衛氣之日行於陽而逆於陽者為外腠膜之脹夜行於陰而逆於陰者為內油膜之脹是以內經脹論云脹者皆在藏府之外排藏府而廓胸脅脹皮膚下文又申之曰榮氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹知此則知瘧之成臌不外乎氣結血凝矣治法必泄其榮血之瘀結而後衛氣始有循行之路如屬外脹者面目黧黑唇口晦暗肌膚甲錯脈弦浮澀宜用通竅活血湯以蔥酒升騰衛氣而麝香引諸藥以行皮膚孔竅之血或用補陽還五湯以黃耆鼓舞衛氣而蚯蚓引諸藥以行肌腠絡脈之血如屬內脹者食下飽脹拒按煩躁喘急小便赤大便黑溏脈弦沉結宜先用醋黃散去其瘀次用人參芎歸湯攻補並施以桂能蒸動榮血參能補助衛氣也至於衛氣不行即釀為水榮血久瘀亦化為水是氣結血凝之外又有水裹一症宜用大黃甘遂湯加桃仁防己主之或用調榮散斟酌施用靡不奏效經云諸濕脹滿皆屬於脾古人成法每多分消詳各方書不贅
