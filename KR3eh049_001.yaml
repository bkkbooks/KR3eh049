body:
  text: 卷一論治瘧先明榮衛榮衛之道變通無窮論其從出之原則元真與水穀之氣而已榮血出於中焦乃胃中水穀之汁所化實本下焦元真之氣以生少陰陽明戊癸合化衛氣出於下焦乃腎中元真之氣所生亦本中焦水穀之汁以化靈樞榮衛會生篇云人受氣於谷谷入於胃清者為榮濁者為衛此先天後天互相生化之榮衛也夫榮乃有形之血有從心脈而行於二十八脈者有從胃絡而行於十二經者有滲入於衝脈者衛乃無形之氣有從肺脈而行於二十八脈者有從足太陽而日行陽夜行陰者有上出於督脈者是榮衛之內外出入陰陽順逆道路異同度數疾徐一一各殊醫者不可不辨也榮血從心脈而出以行脈內衛氣從肺脈而出以行脈外所謂心榮肺衛也宗氣積於胸中別出兩行榮衛之道一貫心脈而行呼吸靈樞邪客篇云宗氣積於胸中出於喉嚨以貫心脈而行呼吸一出於肺而行呼吸靈樞五味篇云大氣之搏而不行者積於胸中命曰氣海出於肺循喉嚨呼則出吸則入人身經脈上下左右前後二十八脈手之三陰三陽足之三陰三陽上下左右二十四脈並左右之兩蹺前之任後之督共二十四脈計一十六丈二尺為一周一呼一吸脈行六寸二百七十息脈行十六丈二尺為一周一萬三千五百息脈行五十度而大周於身矣夫呼則八萬四千毛竅皆合吸則八萬四千毛竅皆開是宗氣之呼吸固偕榮衛以流行而毛竅之開合不賴榮衛以衛護哉此為一日一夜並行五十周之榮衛也按榮行脈中衛行脈外即此榮衛也榮血出於胃絡順脈而行始於手太陰肺經之太淵穴而行於手陽明大腸經足陽明胃經足太陰脾經手少陰心經手太陽小腸經足太陽膀胱經足少陰腎經手厥陰心包絡手少陽三焦經足少陽膽經足厥陰肝經而又始於手太陰肺經是從手足之指井而入於藏府復從頭胸之氣街而出於皮膚支者從肝交督而沖任蹺維帶脈俱不與焉衛氣出於足太陽逆脈而行平旦陰盡從足太陽之睛明穴散及於少陽陽明下入少陰復從少陰而出於太陽如是者二十五周陽盡入陰始從足少陰逆行五藏腎注心心注肺肺注肝肝注脾脾復注腎為一周亦如陽行二十五周而復合於目也夫榮血之行於十二經隧與衛氣日行於皮膚肌腠之分夜行於藏府膜原之間一疾一徐順而行相干則亂靈樞五亂篇云榮氣順脈衛氣逆行清濁相干亂於胸中是謂大悗下文並有亂於心肺腸胃臂胚與頭諸症並行則脹矣靈樞脹論云榮氣從脈衛氣逆為脈脹衛氣並脈循分為膚脹下文並有五藏六府之脹此為一日一夜一周之榮血及五十周之衛氣交相逆順而行者也按榮氣順脈衛氣逆行即此榮衛也衝脈之榮血從陽明而滲入者男子絡唇口而生鬚髮女子月事以時下督脈之衛氣從陽明而上出者二十二日從背而注於伏沖九日從腹而出於缺盆靈樞歲露篇云衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內注於伏沖之脈其行九日出於缺盆之中此一月一周之榮衛以應月行一月而一周天者故月始生則血氣始精衛氣始行月廓滿則血氣實肌肉堅月廓空則肌肉減經絡虛衛氣去形獨居素問八正神明論云月始生則血氣始精衛氣始行月廓滿則血氣實肌肉堅月廓空則肌肉減經絡虛衛氣去形獨居是沖督之榮衛以月之盈虧而應身之虛實男子暗中運動固無從驗若女子一月一行衛氣疾則經行早衛氣徐則經行遲其較著矣此為一月一周相通之榮衛也總而論之榮衛者人身所首重也榮衛調和則神機出入氣立如故榮衛逆亂則陰陽厥逆奇恆病起榮衛泣除則精氣弛壞神去而不可復收矣然則榮衛非人身之化機而疾病系之哉論瘧舍關榮素問瘧論謂夏傷於暑藏於皮膚之內腸胃之外此榮氣之所舍也蓋以瘧邪入於榮舍外則伏於軀殼之腠膜內則伏於藏府之油膜也夫皮膚之血氣從指井而注於經脈從經脈而入於藏府藏府之氣血從大絡而注於孫絡從孫絡而出於皮膚是榮氣出入於內外膜原之間必有所歷之界分有界分必有其舍猶行人之有傳舍此即所謂榮氣之舍也瘧邪伏於軀殼之腠膜中於頭項者氣至頭項而作中於腰背者氣至腰背而作中於手足者氣至手足而作中於胸腹者氣至胸腹而作此皆關於軀殼內之榮舍也瘧邪伏於藏府之油膜有其氣之舍深內薄於陰者陽氣獨發陰邪內著陰與陽爭不得出則間日而作有邪氣內薄五藏橫連膜原者其道遠其氣深其行遲不能與衛氣俱行不得皆出亦間日而作有邪氣客於六府者與衛氣有時相失不能相得故休數日或間二日乃作此皆關於藏府外之榮舍也夫人身之膜原有外內故邪伏之榮舍有淺深衛氣之離合有遠近故瘧病之作止有遲速耳治瘧者無論一日一作關於膜原必視其榮舍之所在即間日及數日一作亦關於膜原必視其榮舍之所在榮舍不拔則主客交渾如油入面莫之或離其發而愈愈而復發者多矣甚至有綿延兩三年者且治之不得其法瘧邪結於軀殼內之榮舍則癰瘍瘡腫瘧邪結於藏府外之榮舍則癥瘕積聚若劫動榮舍迫傷陰陽諸絡則吐衄便血矣此治瘧所以必攻榮舍也然經謂衛氣之所發必開其腠理腠理開則邪氣入者非有他邪之所入即此榮舍所注之邪入於腠理是腠理乃瘧邪之出路故治瘧亦必開膜原也漢唐以來治瘧諸方如用鱉甲鯪鯉甲䗪蟲蜣螂之類以攻榮舍草果檳榔厚朴蜀漆之類以開膜原深得治瘧之旨後世不察不以為探本之治而以為截瘧之法惜哉予故約其說曰治瘧不攻榮舍則瘧邪之盤距自固治瘧不開膜原則瘧邪之走泄無門余雖不敏敢以此為治瘧之要訣焉論瘧發關衛素問論瘧謂衛氣之所在與邪氣相合則病作者以邪與衛合則作邪與衛離則已也然瘧之初起衛氣陷入於陰必引呻呵欠衛氣陷則不能衛護肌表亦必毫毛灑淅此瘧病關於衛氣之見端也且衛氣陷而三陽之氣並於陰則陰實而陽虛陽明虛則寒慄鼓頷巨陽虛則腰脊頭項痛陽氣虛極而陰勝則骨寒而痛寒生於內矣陽虛則外寒陰勝則內寒是以內外皆寒非湯火所能溫迨陰氣逆極則陽氣復出而並於陽巨陽盛則頭痛如破陽明盛則渴欲飲冷若喘則陰虛於下而陽逆於上也陽盛則外熱陰虛則內熱是以內外皆熱非冰水所能寒極則陰陽俱衰衛氣相離其病得休也然則多寒少熱之牡瘧多熱少寒之溫瘧但熱不寒之癉瘧何莫非陰陽之氣交併而各造其偏哉其作有時者衛氣晝行於皮膚分肉之間遇邪則日作夜行於藏府膜原之內遇邪則夜作其晝轉為夜者邪薄於內衛氣入陰與邪遇夜轉為晝者邪達於外衛氣出陽與邪遇其日作轉為間作者邪進而衛氣漸遠間作轉為日作者邪出而衛氣漸近也若日晏與其日早者邪氣客於風府循膂而下衛氣一日一夜會於風府日下一節二十一日下至尾骶其作日晏二十二日入於脊內注於伏沖其氣上行九日出於缺盆作日益早故瘧病之發關於衛氣治瘧者攻其榮舍則衛氣自無阻礙開其腠理則衛氣自得循行不治衛而衛自治矣然有當治者瘧作之末寒熱交罷臭汗自出穢氣燻人此伏邪外達之機如風涼外束或沐浴水氣閉塞肌腠汗不出者治當宣發衛氣令其作汗如瘧久不休真元虧衰肢冷息微大汗淋漓徐靈胎所謂亡陽之汗者治當溫納衛氣方免虛脫之虞亦有體氣素弱及新產婦人或邪氣內閉而衛氣外脫者治當先用溫補後用清涼也若瘧作之後衛氣外散則身浮面腫衛氣內陷則胸腹痞脹各有治法是在醫者之活潑耳論瘧脈自弦靈樞論衛氣失常則其脈大而弦急以衛氣一有阻滯內薄脈道便挺然指下有千鈞槓鼎之力故瘧病之關於衛氣者未作之先固不弦已作之後亦不弦惟當作之際則弦耳間有前後見弦者必其瘧之最劇者矣然不但初病之脈乃弦即經年之久瘧不解正氣虛弱脈不鼓指而弦象亦隱然在內仲景淵源內經故以瘧脈自弦一語提挈宗旨而寒熱虛實等因浮沉遲數諸脈總不外乎弦象所以金匱曰弦數者多熱弦遲者多寒弦沉緊者下之差弦浮滑者可發汗針灸弦滑大者可吐之可見瘧脈之操縱進退一惟弦字主之耳至謂弦遲者可溫之則弦數者當涼之矣後世因弦數條下有風發也以飲食消息止之十字不疑編者之訛偏執風寒二字定為瘧疾鐵案以弦為東方風木之脈遂牽少陽之半表半裡為藏瘧之舍往來寒熱為發瘧之狀意欲舍內經而推尊仲景豈知反以晦仲景之道哉考其故自晉王叔和撰脈經因瘧脈自弦以弦為少陽主脈於是天下之談脈者無不奉以為法如喻嘉言徐靈胎魏玉璜諸公更專主少陽數千年來無有敢議其非者詎知弦乃衛氣不行之脈仲景言之不少概見如水飲病之偏弦雙弦水腫病之弦微弦緊莫非衛氣不行所致豈獨瘧也哉韓善徵謂瘧無一定之因自無一定之脈不得因弦字而執拘不知風瘧脈緩寒瘧脈緊暑瘧脈芤濕瘧脈濡溫熱之瘧脈數要皆因弦字而兼見或獨見於瘧之前後以露本來受邪之真相故謂瘧脈弦而兼他脈則可謂瘧而全不見弦脈則不得謂之瘧矣
